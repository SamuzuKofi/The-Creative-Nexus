{% extends 'base.html' %}

{% block title %}Password Reset Complete - The Creative Nexus{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0" style="border-radius: var(--radius-lg);">
                <div class="card-body p-4 p-md-5 text-center">
                    <div style="width: 80px; height: 80px; background: var(--color-accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-lg);">
                        <i data-lucide="check-circle" style="width: 40px; height: 40px; color: var(--color-accent);"></i>
                    </div>
                    
                    <h3 style="font-weight: 600; margin-bottom: var(--space-md);">Password Updated!</h3>
                    
                    <p class="text-muted mb-4">
                        Your password has been successfully reset. You may go ahead and log in now with your new password.
                    </p>
                    
                    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2" style="font-weight: 500; border-radius: var(--radius-md);">
                        <i data-lucide="log-in" style="width: 18px; height: 18px; margin-right: 8px;"></i>
                        Log In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
